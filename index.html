<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f9a8d4">
    <title>Medicine Tracker</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Recovery Tracker</h1>
            <p class="subtitle">Quick log your wisdom teeth medication</p>
        </header>

        <section class="past-time-section">
            <button id="time-toggle-btn" class="time-toggle-btn" onclick="togglePastTime()">
                <i data-feather="clock"></i> <span>Log Past Dose</span>
            </button>
            <div id="past-time-container" class="hidden">
                <div class="day-selector-container">
                    <div class="day-selector" id="day-selector">
                        <!-- Days will be dynamically inserted here -->
                    </div>
                </div>
                <div class="time-selector-container">
                    <div class="time-picker-column" id="hour-picker"></div>
                    <div class="time-picker-divider">:</div>
                    <div class="time-picker-column" id="minute-picker"></div>
                    <div class="time-picker-divider"></div>
                    <div class="time-picker-column" id="ampm-picker"></div>
                </div>
            </div>
        </section>

        <section class="action-section">
            <div class="action-buttons">
                <!-- Pain Relief -->
                <button class="dose-btn norco" onclick="logMedicine('Norco')">
                    <span class="emoji">💊</span>
                    <div class="btn-text">
                        <span class="med-name">Norco</span>
                    </div>
                </button>
                <button class="dose-btn acetaminophen" onclick="logMedicine('Acetaminophen')">
                    <span class="emoji">🟠</span>
                    <div class="btn-text">
                        <span class="med-name">Acetaminophen</span>
                    </div>
                </button>
                <button class="dose-btn ibuprofen" onclick="logMedicine('Ibuprofen')">
                    <span class="emoji">🔵</span>
                    <div class="btn-text">
                        <span class="med-name">Ibuprofen</span>
                    </div>
                </button>

                <!-- Antibiotics & Other -->
                <button class="dose-btn amoxicillin" onclick="logMedicine('Amoxicillin')">
                    <span class="emoji">🦠</span>
                    <div class="btn-text">
                        <span class="med-name">Amoxicillin</span>
                    </div>
                </button>
                <button class="dose-btn ondansetron" onclick="logMedicine('Ondansetron')">
                    <span class="emoji">🤢</span>
                    <div class="btn-text">
                        <span class="med-name">Ondansetron</span>
                    </div>
                </button>
                <button class="dose-btn rinse" onclick="logMedicine('Chlorhexidine')">
                    <span class="emoji">💧</span>
                    <div class="btn-text">
                        <span class="med-name">Chlorhexidine</span>
                    </div>
                </button>

                <!-- Additional Meds -->
                <button class="dose-btn nicotine" onclick="logMedicine('Nicotine Patch')">
                    <span class="emoji">🩹</span>
                    <div class="btn-text">
                        <span class="med-name">Nicotine Patch</span>
                    </div>
                </button>
                <button class="dose-btn quetiapine" onclick="logMedicine('Quetiapine')">
                    <span class="emoji">😴</span>
                    <div class="btn-text">
                        <span class="med-name">Quetiapine</span>
                    </div>
                </button>
                <button class="dose-btn lorazepam" onclick="logMedicine('Lorazepam')">
                    <span class="emoji">🧘</span>
                    <div class="btn-text">
                        <span class="med-name">Lorazepam</span>
                    </div>
                </button>
                <button class="dose-btn adderall" onclick="logMedicine('Adderall')">
                    <span class="emoji">⚡</span>
                    <div class="btn-text">
                        <span class="med-name">Adderall</span>
                    </div>
                </button>
            </div>
        </section>

        <section class="history-section">
            <div class="history-header">
                <h2>Dose History</h2>
                <button class="clear-btn" onclick="clearHistory()" title="Clear all history">
                    <i data-feather="trash-2"></i>
                </button>
            </div>
            <div id="timeline-container" class="timeline-container hidden">
                <!-- Timeline rows generated by JS -->
            </div>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Medicine</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state">
                    <i data-feather="inbox"></i>
                    <p>No medicines logged yet. Take your first dose!</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Edit Dose Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Dose</h3>
            <div class="form-group">
                <label for="edit-medicine">Medicine</label>
                <select id="edit-medicine">
                    <option value="Norco">Norco</option>
                    <option value="Acetaminophen">Acetaminophen</option>
                    <option value="Ibuprofen">Ibuprofen</option>
                    <option value="Amoxicillin">Amoxicillin</option>
                    <option value="Ondansetron">Ondansetron</option>
                    <option value="Chlorhexidine">Chlorhexidine</option>
                    <option value="Nicotine Patch">Nicotine Patch</option>
                    <option value="Quetiapine">Quetiapine</option>
                    <option value="Lorazepam">Lorazepam</option>
                    <option value="Adderall">Adderall</option>
                </select>
            </div>
            <div class="form-group">
                <label for="edit-date">Date</label>
                <input type="date" id="edit-date">
            </div>
            <div class="form-group">
                <label for="edit-time">Time</label>
                <input type="time" id="edit-time">
            </div>
            <input type="hidden" id="edit-id">
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="save-btn" onclick="saveEditDose()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        feather.replace();
    </script>
</body>

</html>
