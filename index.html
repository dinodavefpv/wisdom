<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f9a8d4">
    <title>Med Tracker</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Med Tracker</h1>
            <p class="subtitle">Quick log your wisdom medications</p>
        </header>

        <section class="past-time-section">
            <button id="time-toggle-btn" class="time-toggle-btn" onclick="togglePastTime()">
                <i data-feather="clock"></i> <span>Log Past Dose</span>
            </button>
            <div id="past-time-container" class="hidden">
                <div class="day-selector-container">
                    <div class="day-selector" id="day-selector">
                        <!-- Days will be dynamically inserted here -->
                    </div>
                </div>
                <div class="time-selector-container">
                    <div class="time-picker-column" id="hour-picker"></div>
                    <div class="time-picker-divider">:</div>
                    <div class="time-picker-column" id="minute-picker"></div>
                    <div class="time-picker-divider"></div>
                    <div class="time-picker-column" id="ampm-picker"></div>
                </div>
            </div>
        </section>

        <section class="action-section">
            <div class="action-buttons">
                <!-- Buttons will be injected here via JS -->
            </div>
            <button class="edit-list-btn" onclick="openEditListModal()">
                <i data-feather="edit-2"></i> Edit Medicine List
            </button>
        </section>

        <section class="history-section">
            <div class="history-header">
                <h2>Dose History</h2>
                <button class="clear-btn" onclick="clearHistory()" title="Clear all history">
                    <i data-feather="trash-2"></i>
                </button>
            </div>
            <div id="timeline-container" class="timeline-container hidden">
                <!-- Timeline rows generated by JS -->
            </div>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Medicine</th>
                            <th>Qty</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state">
                    <i data-feather="inbox"></i>
                    <p>No medicines logged yet. Take your first dose!</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Edit Dose Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Dose</h3>
                <button class="icon-btn delete-btn" onclick="deleteEditingDose()" title="Delete Dose">
                    <i data-feather="trash-2"></i>
                </button>
            </div>

            <div class="form-group">
                <label for="edit-medicine">Medicine</label>
                <select id="edit-medicine">
                    <!-- Options populated by JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Time</label>
                <div class="time-display-row">
                    <span id="edit-time-display" class="time-display-text">--</span>
                    <button class="secondary-btn" onclick="openEditTimePicker()">Edit Time</button>
                </div>
                <!-- Hidden inputs to store ISO values -->
                <input type="hidden" id="edit-date">
                <input type="hidden" id="edit-time">
            </div>

            <div class="form-group">
                <label for="edit-quantity">Quantity</label>
                <input type="number" id="edit-quantity" step="0.25" min="0">
            </div>

            <div class="form-group">
                <label for="edit-notes">Notes</label>
                <textarea id="edit-notes" rows="3" placeholder="Add notes..."></textarea>
            </div>

            <input type="hidden" id="edit-id">
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="save-btn" onclick="saveEditDose()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Edit Time Picker Modal (reusing structure similar to past-time but in a modal) -->
    <div id="edit-time-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Set Time</h3>
            <div class="day-selector-container">
                <div class="day-selector" id="edit-day-selector">
                    <!-- Days inserted via JS -->
                </div>
            </div>
            <div class="time-selector-container">
                <div class="time-picker-column" id="edit-hour-picker"></div>
                <div class="time-picker-divider">:</div>
                <div class="time-picker-column" id="edit-minute-picker"></div>
                <div class="time-picker-divider"></div>
                <div class="time-picker-column" id="edit-ampm-picker"></div>
                <div class="time-picker-highlight"></div>
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeEditTimeModal()">Cancel</button>
                <button class="save-btn" onclick="applyEditTime()">Set Time</button>
            </div>
        </div>
    </div>

    <!-- Color Picker Modal -->
    <div id="color-picker-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Select Color</h3>
            <div id="color-grid" class="color-grid">
                <!-- Swatches injected here -->
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeColorPickerModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Medicine List Modal -->
    <div id="edit-list-modal" class="modal hidden">
        <div class="modal-content modal-large">
            <h3>Edit Medicine List</h3>
            <div id="medicine-list-container" class="medicine-list-container">
                <!-- Medicine items injected here -->
            </div>

            <div class="add-med-container">
                <button class="add-med-btn" onclick="addNewMedicine()">
                    <i data-feather="plus"></i> Add New Medicine
                </button>
            </div>

            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeEditListModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        feather.replace();
    </script>
</body>

</html>
